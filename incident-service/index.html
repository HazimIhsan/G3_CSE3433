<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief Coordination Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-danger shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚨 Disaster Relief Coordination Center</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">
            
            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-dark text-white font-weight-bold">
                        📢 Form A: Report New Incident
                    </div>
                    <div class="card-body">
                        <form id="incidentForm">
                            <div class="mb-3">
                                <label class="form-label">Disaster Type</label>
                                <select class="form-select" id="disasterType" required>
                                    <option value="Flood">Flood 🌊</option>
                                    <option value="Earthquake">Earthquake 🫨</option>
                                    <option value="Wildfire">Wildfire 🔥</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Location / Sector</label>
                                <input type="text" class="form-control" id="location" placeholder="e.g., Sector 7, North District" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100">Submit Emergency Report</button>
                        </form>
                        <div id="incidentMessage" class="mt-3 text-success font-monospace fw-bold"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white font-weight-bold">
                        🚚 Form B: Dispatch Supplies & Coordinate
                    </div>
                    <div class="card-body">
                        <form id="dispatchForm">
                            <div class="mb-3">
                                <label class="form-label">Target Incident ID</label>
                                <input type="number" class="form-control" id="incidentId" placeholder="e.g., 101" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Select Supply Item</label>
                                <select class="form-select" id="resourceType" required>
                                    <option value="water">Bottled Water Boxes</option>
                                    <option value="medical">First Aid Kits</option>
                                    <option value="tents">Emergency Tents</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Quantity to Deduct/Send</label>
                                <input type="number" class="form-control" id="quantity" placeholder="e.g., 50" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Deduct & Allocate Stock</button>
                        </form>
                        <div id="dispatchMessage" class="mt-3 text-primary font-monospace fw-bold"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Form A: Sends data to Incident Service (Port 5001)
        document.getElementById('incidentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('disasterType').value;
            const loc = document.getElementById('location').value;

            try {
                const response = await fetch('http://localhost:5001/api/incidents', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: type, location: loc })
                });
                const data = await response.json();
                document.getElementById('incidentMessage').innerText = `Success! Created Incident ID: ${data.id}`;
            } catch (err) {
                document.getElementById('incidentMessage').innerText = "Error connecting to Incident Service.";
            }
        });

        // Form B: Sends data straight to Resource Service (Port 5002) to simulate allocation!
        document.getElementById('dispatchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const item = document.getElementById('resourceType').value;
            const qty = document.getElementById('quantity').value;

            try {
                const response = await fetch('http://localhost:5002/api/resources/deduct', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item: item, quantity: qty })
                });
                const data = await response.json();
                
                if(response.ok) {
                    document.getElementById('dispatchMessage').innerText = `Stock Allocated! Remaining Warehouse Supply: ${data.remaining}`;
                } else {
                    document.getElementById('dispatchMessage').innerText = `Fail: ${data.message}`;
                }
            } catch (err) {
                document.getElementById('dispatchMessage').innerText = "Error connecting to Resource Service.";
            }
        });
    </script>
</body>
</html>
